<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160" role="img" aria-label="WERQA coin mark">
  <defs>
    <radialGradient id="coinFace" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#1B2236"/>
      <stop offset="100%" stop-color="#0A0E1A"/>
    </radialGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C0C4CC"/>
      <stop offset="100%" stop-color="#8B91A0"/>
    </linearGradient>
  </defs>

  <!-- milled outer edge: 60 short ticks around the coin -->
  <g stroke="url(#rim)" stroke-width="2" stroke-linecap="round" opacity="0.9">
    <g transform="translate(80,80)">
      <g id="ticks">
        <!-- 60 tick marks generated as one path -->
        <line x1="0" y1="-77" x2="0" y2="-71"/>
      </g>
      <use href="#ticks" transform="rotate(6)"/>
      <use href="#ticks" transform="rotate(12)"/>
      <use href="#ticks" transform="rotate(18)"/>
      <use href="#ticks" transform="rotate(24)"/>
      <use href="#ticks" transform="rotate(30)"/>
      <use href="#ticks" transform="rotate(36)"/>
      <use href="#ticks" transform="rotate(42)"/>
      <use href="#ticks" transform="rotate(48)"/>
      <use href="#ticks" transform="rotate(54)"/>
      <use href="#ticks" transform="rotate(60)"/>
      <use href="#ticks" transform="rotate(66)"/>
      <use href="#ticks" transform="rotate(72)"/>
      <use href="#ticks" transform="rotate(78)"/>
      <use href="#ticks" transform="rotate(84)"/>
      <use href="#ticks" transform="rotate(90)"/>
      <use href="#ticks" transform="rotate(96)"/>
      <use href="#ticks" transform="rotate(102)"/>
      <use href="#ticks" transform="rotate(108)"/>
      <use href="#ticks" transform="rotate(114)"/>
      <use href="#ticks" transform="rotate(120)"/>
      <use href="#ticks" transform="rotate(126)"/>
      <use href="#ticks" transform="rotate(132)"/>
      <use href="#ticks" transform="rotate(138)"/>
      <use href="#ticks" transform="rotate(144)"/>
      <use href="#ticks" transform="rotate(150)"/>
      <use href="#ticks" transform="rotate(156)"/>
      <use href="#ticks" transform="rotate(162)"/>
      <use href="#ticks" transform="rotate(168)"/>
      <use href="#ticks" transform="rotate(174)"/>
      <use href="#ticks" transform="rotate(180)"/>
      <use href="#ticks" transform="rotate(186)"/>
      <use href="#ticks" transform="rotate(192)"/>
      <use href="#ticks" transform="rotate(198)"/>
      <use href="#ticks" transform="rotate(204)"/>
      <use href="#ticks" transform="rotate(210)"/>
      <use href="#ticks" transform="rotate(216)"/>
      <use href="#ticks" transform="rotate(222)"/>
      <use href="#ticks" transform="rotate(228)"/>
      <use href="#ticks" transform="rotate(234)"/>
      <use href="#ticks" transform="rotate(240)"/>
      <use href="#ticks" transform="rotate(246)"/>
      <use href="#ticks" transform="rotate(252)"/>
      <use href="#ticks" transform="rotate(258)"/>
      <use href="#ticks" transform="rotate(264)"/>
      <use href="#ticks" transform="rotate(270)"/>
      <use href="#ticks" transform="rotate(276)"/>
      <use href="#ticks" transform="rotate(282)"/>
      <use href="#ticks" transform="rotate(288)"/>
      <use href="#ticks" transform="rotate(294)"/>
      <use href="#ticks" transform="rotate(300)"/>
      <use href="#ticks" transform="rotate(306)"/>
      <use href="#ticks" transform="rotate(312)"/>
      <use href="#ticks" transform="rotate(318)"/>
      <use href="#ticks" transform="rotate(324)"/>
      <use href="#ticks" transform="rotate(330)"/>
      <use href="#ticks" transform="rotate(336)"/>
      <use href="#ticks" transform="rotate(342)"/>
      <use href="#ticks" transform="rotate(348)"/>
      <use href="#ticks" transform="rotate(354)"/>
    </g>
  </g>

  <!-- coin body -->
  <circle cx="80" cy="80" r="62" fill="url(#coinFace)"/>
  <circle cx="80" cy="80" r="62" fill="none" stroke="#242B3D" stroke-width="1.5" opacity="0.7"/>

  <!-- inner ring shadow -->
  <circle cx="80" cy="80" r="55" fill="none" stroke="#1B2236" stroke-width="1" opacity="0.5"/>

  <!-- W hallmark -->
  <path d="M44 70 L56 100 L66 70 L80 100 L94 70 L104 100 L116 56"
        stroke="#00C896" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- minted highlight -->
  <ellipse cx="64" cy="56" rx="22" ry="6" fill="#FFFFFF" opacity="0.05"/>
</svg>
