<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" width="720" height="160" role="img" aria-label="werqa coin + wordmark horizontal lockup">
  <defs>
    <style>
      @import url('https://api.fontshare.com/v2/css?f[]=clash-display@500&display=swap');
      .w { font-family: 'Clash Display', 'Inter', sans-serif; font-weight: 500; font-size: 110px; letter-spacing: -0.035em; }
    </style>
    <radialGradient id="mintCoin2" cx="0.42" cy="0.35" r="0.75">
      <stop offset="0%" stop-color="#1AE0A9"/>
      <stop offset="100%" stop-color="#00A077"/>
    </radialGradient>
  </defs>
  <!-- coin -->
